<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Speed Dial Sync</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#4d8cff">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SpeedDial">
<link rel="stylesheet" href="shared/style.css">
</head>
<body>

  <div id="login-screen" class="screen hidden">
    <form id="login-form">
      <h1>Speed Dial Sync</h1>
      <input type="email" id="login-email" placeholder="メールアドレス" required>
      <input type="password" id="login-password" placeholder="パスワード" required>
      <button type="submit">ログイン</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>

  <div id="app-screen" class="screen hidden">
    <div id="top-bar">
      <div id="group-tabs"></div>
      <div id="top-bar-actions">
        <button id="settings-btn">⚙ 表示設定</button>
        <button id="logout-btn">ログアウト</button>
      </div>
    </div>
    <div id="link-grid"></div>
  </div>

  <div id="link-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="link-modal-title">リンクを追加</h2>
      <input type="text" id="link-title-input" placeholder="タイトル">
      <input type="text" id="link-url-input" placeholder="https://...">
      <select id="link-group-select"></select>
      <div class="modal-actions">
        <button id="link-delete-btn" class="hidden">削除</button>
        <button id="link-cancel-btn">キャンセル</button>
        <button id="link-save-btn">保存</button>
      </div>
    </div>
  </div>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <h2>表示設定</h2>
      <div class="settings-row">
        <label>カードサイズ: <span id="card-size-value" class="settings-value"></span></label>
        <input type="range" id="card-size-input" min="100" max="220" step="10">
      </div>
      <div class="settings-row">
        <label>列数(0 = 自動調整)</label>
        <input type="number" id="columns-input" min="0" max="12" step="1">
      </div>
      <div class="settings-row">
        <label>背景画像URL(空欄で解除)</label>
        <input type="text" id="bg-image-input" placeholder="https://...">
      </div>
      <div class="modal-actions">
        <button id="settings-reset-btn">リセット</button>
        <button id="settings-cancel-btn">キャンセル</button>
        <button id="settings-save-btn">保存</button>
      </div>
    </div>
  </div>

  <script type="module" src="shared/app.js"></script>
</body>
</html>
