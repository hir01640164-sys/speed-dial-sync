<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Speed Dial Sync</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#4d8cff">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SpeedDial">
<link rel="stylesheet" href="shared/style.css">
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Now Loading...</p>
  </div>

  <div id="login-screen" class="screen hidden">
    <form id="login-form">
      <h1>Speed Dial Sync</h1>
      <input type="email" id="login-email" placeholder="メールアドレス" required>
      <input type="password" id="login-password" placeholder="パスワード" required>
      <button type="submit">ログイン</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>

  <div id="app-screen" class="screen hidden">
    <div id="top-bar">
      <div id="group-tabs"></div>
    </div>
    <div id="link-grid"></div>
    <button id="page-prev-btn" class="page-nav page-nav-left hidden">‹</button>
    <button id="page-next-btn" class="page-nav page-nav-right hidden">›</button>

    <div id="top-bar-actions">
      <button id="more-menu-btn" title="メニュー" aria-label="メニュー">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <circle cx="12" cy="5" r="2"></circle>
          <circle cx="12" cy="12" r="2"></circle>
          <circle cx="12" cy="19" r="2"></circle>
        </svg>
      </button>
      <div id="more-menu" class="context-menu hidden">
        <button id="settings-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          表示設定
        </button>
        <button id="logout-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          ログアウト
        </button>
      </div>
    </div>
  </div>

  <div id="tab-context-menu" class="context-menu hidden">
    <button id="tab-rename-btn">リネーム</button>
    <button id="tab-delete-btn">削除</button>
  </div>

  <div id="link-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="link-modal-title">リンクを追加</h2>
      <input type="text" id="link-title-input" placeholder="タイトル">
      <input type="text" id="link-url-input" placeholder="https://...">
      <select id="link-group-select"></select>

      <label class="field-label">アイコン</label>
      <div class="icon-row">
        <img id="link-icon-preview" class="icon-preview" alt="">
        <select id="link-icon-mode-select">
          <option value="auto">自動(ファビコン)</option>
          <option value="url">URLで指定</option>
          <option value="file">端末から選択</option>
          <option value="preset">プリセットから選択</option>
        </select>
      </div>
      <input type="text" id="link-icon-url-input" placeholder="https://.../icon.png" class="hidden">
      <input type="file" id="link-icon-file-input" accept="image/*" class="hidden">
      <div id="link-icon-preset-grid" class="icon-preset-grid hidden"></div>

      <div class="modal-actions">
        <button id="link-delete-btn" class="hidden">削除</button>
        <button id="link-cancel-btn">キャンセル</button>
        <button id="link-save-btn">保存</button>
      </div>
    </div>
  </div>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <h2>表示設定</h2>
      <div class="settings-row">
        <label>テーマカラー</label>
        <input type="color" id="theme-color-input">
      </div>
      <div class="settings-row">
        <label>プリセットアイコンの背景</label>
        <select id="icon-style-input">
          <option value="light">白地</option>
          <option value="dark">黒地</option>
          <option value="transparent">透過</option>
        </select>
      </div>
      <div class="settings-row">
        <label>ホーム画面アイコンの色</label>
        <div class="icon-row">
          <img id="home-icon-preview" class="icon-preview" alt="">
          <input type="color" id="home-icon-color-input" style="flex:1;">
        </div>
        <p class="field-note">※iOSは「ホーム画面に追加」した瞬間のアイコンを保存するため、変更を反映するには一度ホーム画面のアイコンを削除して追加し直してください。</p>
      </div>
      <div class="settings-row">
        <label>列数: <span id="columns-value" class="settings-value"></span></label>
        <input type="range" id="columns-input" min="1" max="12" step="1">
      </div>
      <div class="settings-row">
        <label>左右の余白: <span id="margin-x-value" class="settings-value"></span></label>
        <input type="range" id="margin-x-input" min="0" max="120" step="4">
      </div>
      <div class="settings-row">
        <label>上下の余白: <span id="margin-y-value" class="settings-value"></span></label>
        <input type="range" id="margin-y-input" min="0" max="120" step="4">
      </div>
      <div class="settings-row">
        <label>アイコンサイズ: <span id="icon-scale-value" class="settings-value"></span></label>
        <input type="range" id="icon-scale-input" min="10" max="60" step="2">
      </div>
      <div class="settings-row">
        <label>グループバーの不透明度: <span id="topbar-opacity-value" class="settings-value"></span></label>
        <input type="range" id="topbar-opacity-input" min="20" max="100" step="5">
      </div>
      <div class="settings-row">
        <label>カードの不透明度: <span id="card-opacity-value" class="settings-value"></span></label>
        <input type="range" id="card-opacity-input" min="20" max="100" step="5">
      </div>
      <div class="settings-row">
        <label>背景画像(空欄で解除)</label>
        <div class="icon-row">
          <img id="bg-image-preview" class="icon-preview bg-preview" alt="">
          <input type="text" id="bg-image-input" placeholder="https://...">
        </div>
        <input type="file" id="bg-image-file-input" accept="image/*">
      </div>
      <div class="settings-row">
        <label>Speed Dial 2バックアップのインポート(既存データは全て置き換わります)</label>
        <input type="file" id="import-file-input" accept="application/json" class="hidden">
        <button type="button" id="import-btn">JSONファイルを選択してインポート</button>
      </div>
      <div class="modal-actions">
        <button id="settings-reset-btn">リセット</button>
        <button id="settings-cancel-btn">キャンセル</button>
        <button id="settings-save-btn">保存</button>
      </div>
    </div>
  </div>

  <script type="module" src="shared/app.js"></script>
</body>
</html>
